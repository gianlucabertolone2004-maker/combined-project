<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — Spongebob Uncopylocked</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

  :root {
    --bg: #0a0b0f;
    --panel: #12141a;
    --line: #232631;
    --text: #e8e9ed;
    --text-dim: #6b6f80;
    --accent: #ffd83d;
    --accent-dim: #3a3318;
    --danger: #fb7185;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: linear-gradient(180deg, #0a1f3d 0%, #0d2847 30%, #0a1f3d 70%, #051320 100%);
    color: var(--text);
    font-family: 'Space Grotesk', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  .bubble {
    position: fixed;
    bottom: -10%;
    border-radius: 50%;
    background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.5), rgba(173,230,255,0.1));
    border: 1px solid rgba(255,255,255,0.2);
    animation: rise linear infinite;
    pointer-events: none;
  }

  @keyframes rise {
    0% { transform: translateY(0) translateX(0); opacity: 0; }
    10% { opacity: 0.6; }
    90% { opacity: 0.4; }
    100% { transform: translateY(-110vh) translateX(var(--drift, 20px)); opacity: 0; }
  }

  .seaweed {
    position: fixed;
    bottom: 0;
    width: 14px;
    background: linear-gradient(180deg, #1a5c3a, #0d3d24);
    border-radius: 40px 40px 0 0;
    transform-origin: bottom center;
    animation: sway 4s ease-in-out infinite;
    opacity: 0.5;
    pointer-events: none;
  }

  @keyframes sway {
    0%, 100% { transform: rotate(-4deg); }
    50% { transform: rotate(4deg); }
  }

  .grid-bg {
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(173,230,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(173,230,255,0.04) 1px, transparent 1px);
    background-size: 48px 48px;
    mask-image: radial-gradient(circle at 50% 40%, black 0%, transparent 70%);
  }

  .glow {
    position: fixed;
    width: 700px;
    height: 700px;
    background: radial-gradient(circle, rgba(255, 216, 61, 0.06) 0%, transparent 70%);
    top: -250px;
    left: 50%;
    transform: translateX(-50%);
    pointer-events: none;
  }

  .light-ray {
    position: fixed;
    top: -10%;
    width: 120px;
    height: 130%;
    background: linear-gradient(180deg, rgba(255,255,255,0.08), transparent 70%);
    transform: rotate(8deg);
    pointer-events: none;
  }

  .card {
    position: relative;
    z-index: 1;
    width: 380px;
    background: rgba(18, 24, 35, 0.85);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255, 216, 61, 0.15);
    border-radius: 14px;
    padding: 2.5rem 2.25rem;
    box-shadow: 0 40px 80px -40px rgba(0,0,0,0.7);
  }

  .eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.12em;
    color: var(--accent);
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 14px;
  }

  .eyebrow::before {
    content: '';
    width: 6px;
    height: 6px;
    background: var(--accent);
    border-radius: 50%;
    box-shadow: 0 0 8px var(--accent);
  }

  h1 {
    font-size: 26px;
    font-weight: 600;
    letter-spacing: -0.01em;
    margin-bottom: 6px;
  }

  .sub {
    color: var(--text-dim);
    font-size: 14px;
    margin-bottom: 2rem;
  }

  label {
    display: block;
    font-size: 12px;
    font-family: 'JetBrains Mono', monospace;
    color: var(--text-dim);
    margin-bottom: 6px;
    margin-top: 1.1rem;
  }

  input {
    width: 100%;
    background: #0d0f14;
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 12px 14px;
    color: var(--text);
    font-family: 'Space Grotesk', sans-serif;
    font-size: 14px;
    transition: border-color 0.15s ease;
  }

  input:focus {
    outline: none;
    border-color: var(--accent);
  }

  input::placeholder { color: #454959; }

  button {
    width: 100%;
    margin-top: 1.75rem;
    background: var(--accent);
    color: #1a1400;
    border: none;
    border-radius: 8px;
    padding: 13px;
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
    transition: filter 0.15s ease, transform 0.1s ease;
  }

  button:hover { filter: brightness(1.08); }
  button:active { transform: scale(0.98); }
  button:disabled { opacity: 0.6; cursor: not-allowed; }

  .msg {
    margin-top: 14px;
    font-size: 13px;
    padding: 10px 12px;
    border-radius: 8px;
    display: none;
  }

  .msg.error {
    display: block;
    background: rgba(251, 113, 133, 0.1);
    border: 1px solid rgba(251, 113, 133, 0.25);
    color: var(--danger);
  }

  .footnote {
    margin-top: 1.75rem;
    text-align: center;
    font-size: 12px;
    color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace;
  }

  .key-icon {
    width: 32px;
    height: 32px;
    margin-bottom: 18px;
  }

  @media (prefers-reduced-motion: no-preference) {
    .card { animation: rise 0.5s ease both; }
    @keyframes rise {
      from { opacity: 0; transform: translateY(14px); }
      to { opacity: 1; transform: translateY(0); }
    }
  }
</style>
</head>
<body>

<div class="grid-bg"></div>
<div class="glow"></div>
<div class="light-ray" style="left: 15%;"></div>
<div class="light-ray" style="left: 70%; width: 90px; animation-delay: 1s;"></div>

<div id="bubbleField"></div>
<div id="seaweedField"></div>

<div class="card">
  <div style="font-size: 38px; margin-bottom: 14px; line-height: 1;">🧽</div>

  <div class="eyebrow">Access Required</div>
  <h1>Login to Spongebob Uncopylocked</h1>
  <p class="sub">Use the same account you created with <code>/createaccount</code> on Discord.</p>

  <form id="loginForm">
    <label for="username">Username</label>
    <input type="text" id="username" placeholder="your-username" autocomplete="username" required>

    <label for="password">Password</label>
    <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" required>

    <button type="submit" id="submitBtn">Log in</button>
    <div class="msg error" id="errorMsg"></div>
  </form>

  <p class="footnote">No account? Run /createaccount in Discord first.</p>
</div>

<script>
  const form = document.getElementById('loginForm');
  const errorMsg = document.getElementById('errorMsg');
  const submitBtn = document.getElementById('submitBtn');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    errorMsg.classList.remove('error');
    errorMsg.style.display = 'none';
    submitBtn.disabled = true;
    submitBtn.textContent = 'Signing in...';

    const username = document.getElementById('username').value;
    const password = document.getElementById('password').value;

    try {
      const res = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });
      const data = await res.json();

      if (data.success) {
        window.location.href = '/dashboard';
      } else {
        errorMsg.textContent = data.message;
        errorMsg.classList.add('error');
        errorMsg.style.display = 'block';
        submitBtn.disabled = false;
        submitBtn.textContent = 'Log in';
      }
    } catch (err) {
      errorMsg.textContent = 'Something went wrong. Please try again.';
      errorMsg.classList.add('error');
      errorMsg.style.display = 'block';
      submitBtn.disabled = false;
      submitBtn.textContent = 'Log in';
    }
  });
</script>

<script>
  // Generate rising bubbles
  const bubbleField = document.getElementById('bubbleField');
  for (let i = 0; i < 22; i++) {
    const b = document.createElement('div');
    b.className = 'bubble';
    const size = Math.random() * 22 + 6;
    b.style.width = size + 'px';
    b.style.height = size + 'px';
    b.style.left = Math.random() * 100 + 'vw';
    b.style.animationDuration = (Math.random() * 10 + 8) + 's';
    b.style.animationDelay = (Math.random() * 10) + 's';
    b.style.setProperty('--drift', (Math.random() * 60 - 30) + 'px');
    bubbleField.appendChild(b);
  }

  // Generate swaying seaweed at the bottom edges
  const seaweedField = document.getElementById('seaweedField');
  const seaweedPositions = [2, 6, 92, 96, 12, 88];
  seaweedPositions.forEach((pos, i) => {
    const s = document.createElement('div');
    s.className = 'seaweed';
    const h = Math.random() * 60 + 60;
    s.style.height = h + 'px';
    s.style.left = pos + 'vw';
    s.style.animationDelay = (i * 0.6) + 's';
    s.style.animationDuration = (Math.random() * 2 + 3.5) + 's';
    seaweedField.appendChild(s);
  });
</script>

</body>
</html>
